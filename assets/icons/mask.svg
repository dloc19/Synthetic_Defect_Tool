<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Mask icon — circle with cutouts -->
  <g fill="none" stroke="#d29922" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer face -->
    <circle cx="12" cy="12" r="9" fill="#d2992218"/>
    <!-- Eyes / holes -->
    <circle cx="8.5" cy="10" r="1.5" fill="#d29922"/>
    <circle cx="15.5" cy="10" r="1.5" fill="#d29922"/>
    <!-- Pattern stripes = mask -->
    <line x1="9" y1="15" x2="15" y2="15" stroke-dasharray="2 1.5"/>
  </g>
</svg>
